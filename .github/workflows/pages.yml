name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate offline data
        run: |
          if [ ! -f quran_offline.json ]; then
            echo "quran_offline.json is missing."
            echo "Run download_quran.py locally, then commit quran_offline.json before deploying."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static Pages artifact
        run: |
          mkdir -p dist
          cp -r static/. dist/
          cp quran_offline.json dist/quran_offline.json
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

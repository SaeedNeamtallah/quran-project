<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q Doro | Redirecting</title>
    <meta http-equiv="refresh" content="0; url=./static/">
    <script>
        const path = window.location.pathname.endsWith("/")
            ? window.location.pathname
            : `${window.location.pathname}/`;
        window.location.replace(`${path}static/`);
    </script>
</head>
<body>
    <p>جاري فتح التطبيق...</p>
    <p><a href="./static/">اضغط هنا إذا لم يتم التحويل تلقائيًا</a></p>
</body>
</html>

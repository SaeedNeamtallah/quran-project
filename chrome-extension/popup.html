<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بومودورو قرآني</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="mode-study theme-mint">

  <div class="app-container" id="app-container">

    <!-- Top Bar -->
    <div class="top-bar">
      <button id="stats-btn" class="icon-btn" title="إحصائيات">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
      </button>
      <span class="app-logo">📖 بومودورو قرآني</span>
      <button id="settings-btn" class="icon-btn" title="الإعدادات">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>

    <!-- Timer Section -->
    <div class="timer-section" id="timer-section">
      <div class="mode-indicator" id="mode-indicator">
        <span class="mode-dot"></span>
        <span id="mode-title">وقت التركيز</span>
      </div>
      <div class="timer-ring-container">
        <svg class="timer-ring" viewBox="0 0 200 200">
          <circle class="timer-ring-bg" cx="100" cy="100" r="90"/>
          <circle class="timer-ring-progress" id="timer-progress" cx="100" cy="100" r="90"/>
        </svg>
        <div class="timer-display" id="time-left">30:00</div>
      </div>
      <p class="timer-subtitle" id="mode-subtitle">٣٠ دقيقة عمل عميق</p>
      <div class="controls">
        <button id="start-btn" class="btn btn-primary">▶ ابدأ</button>
        <button id="pause-btn" class="btn btn-primary hidden">⏸ إيقاف</button>
        <button id="reset-btn" class="btn btn-ghost">↻ إعادة</button>
        <button id="skip-btn"  class="btn btn-ghost">⏭ تخطي</button>
      </div>
    </div>

    <!-- Quran Display Section -->
    <div id="quran-display" class="quran-section hidden">
      <div class="loader hidden" id="quran-loader"></div>
      <div id="verses-container" class="verses-area"></div>
      <div class="quran-nav">
        <button id="prev-btn" class="btn btn-ghost">→ السابق</button>
        <div class="info-badge"><span id="hizb-number">--</span></div>
        <button id="next-btn" class="btn btn-ghost">التالي ←</button>
      </div>
    </div>

  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-overlay" id="settings-overlay"></div>
    <div class="modal-body">
      <h2>⚙️ الإعدادات</h2>
      <div class="settings-grid">

        <div class="setting-item">
          <label for="theme-select">المظهر</label>
          <select id="theme-select">
            <option value="mint">🌿 أبيض ومينت</option>
            <option value="lavender">💜 لافندر هادئ</option>
            <option value="sky">☁️ سماوي فاتح</option>
            <option value="rose">🌸 وردي ناعم</option>
            <option value="sand">🏖️ رملي دافئ</option>
          </select>
        </div>

        <div class="setting-item">
          <label for="font-size">حجم خط القرآن</label>
          <select id="font-size">
            <option value="1.5rem">صغير</option>
            <option value="1.9rem" selected>متوسط</option>
            <option value="2.4rem">كبير</option>
          </select>
        </div>

        <div class="setting-item">
          <label for="reading-mode">وضع القراءة</label>
          <select id="reading-mode">
            <option value="rub">أرباع متتالية</option>
            <option value="challenge">تحدي سورة</option>
            <option value="page">صفحات المصحف</option>
          </select>
        </div>

        <div class="setting-item" id="surah-group">
          <label for="challenge-surah">اختر السورة</label>
          <select id="challenge-surah"></select>
        </div>

        <div class="setting-item" id="page-group">
          <label for="current-page">رقم الصفحة (١-٦٠٤)</label>
          <input type="number" id="current-page" min="1" max="604" placeholder="مثال: ١">
        </div>

        <div class="setting-item" id="rub-group">
          <label for="current-rub">الانتقال لربع</label>
          <select id="current-rub"></select>
        </div>

        <div class="setting-item">
          <label for="study-duration">مدة التركيز (دقائق)</label>
          <input type="number" id="study-duration" min="1" max="120" value="30">
        </div>

        <div class="setting-item">
          <label for="break-duration">مدة الاستراحة (دقائق)</label>
          <input type="number" id="break-duration" min="1" max="60" value="15">
        </div>

        <div class="setting-item">
          <label for="rub-count">عدد الأرباع للقراءة</label>
          <input type="number" id="rub-count" min="1" max="8" value="1">
        </div>

      </div>
      <div class="modal-actions">
        <button id="save-settings-btn" class="btn btn-primary">✓ حفظ</button>
        <button id="close-settings-btn" class="btn btn-ghost">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div id="stats-modal" class="modal hidden">
    <div class="modal-overlay" id="stats-overlay"></div>
    <div class="modal-body">
      <h2>📊 إحصائياتك</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-pomodoros">0</div>
          <div class="stat-label">جلسات تركيز</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-rubs">0</div>
          <div class="stat-label">أرباع تمت قراءتها</div>
        </div>
      </div>
      <div class="modal-actions">
        <button id="reset-stats-btn" class="btn btn-ghost">🗑️ مسح الإحصائيات</button>
        <button id="close-stats-btn" class="btn btn-primary">إغلاق</button>
      </div>
    </div>
  </div>

  <audio id="alarm-sound" preload="auto"></audio>

  <script src="popup.js"></script>
</body>
</html>
